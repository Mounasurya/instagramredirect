<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagram Link</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f0f2f5;
        }
        .instagram-link {
            display: inline-block;
            padding: 12px 24px;
            background-color: #E1306C; /* Instagram brand color */
            color: white;
            text-decoration: none;
            border-radius: 5px;
            font-weight: bold;
            transition: background 0.3s ease;
        }
        .instagram-link:hover {
            background-color: #C13584;
        }
    </style>
</head>
<body>

    <a href="https://www.instagram.com/" target="_blank" rel="noopener noreferrer" class="instagram-link">
        Open Instagram
    </a>

</body>
</html>
